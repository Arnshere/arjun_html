<html>
<head>
<style>
div{
right: 30px;
border: 3px solid #73AD21;
}
div.absoulute{
position:absolute;
left: 30px;
border: 3px solid blue;
}
div.relative{
position:relative;
left: 100px;
border: 3px solid #73AD21;
}
div.fixed{
position:fixed;
top:0;
right:20px;
width: 300px;
border: 3px solid #73AD21;
}
div.sticky{
position:sticky;
top:1px;
left:20px;
width:100px;
border: 3px solid #73AD21;
}
</style>
</head>
<body>
    <h2>POSITIONING</h2>
<div>
    div with no position entry
</div>
<div class="sticky">
    div with sticky position property
</div>
<div class="relative">
this div has position relative
</div>
 <div class="absolute">
  absoulute class DIV
 </div>
</div>

<div class="fixed">
  div with fixed position property
</div>
<div style="height: 1800px; border: none;">
</div>




</body>

</html>
